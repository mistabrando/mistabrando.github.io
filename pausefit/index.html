<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#101415" />
    <meta
      name="description"
      content="A daily pause challenge. Watch one real video loop and tap when the subject fits the outline."
    />
    <meta property="og:title" content="PauseFit Daily" />
    <meta
      property="og:description"
      content="One daily video. Pause at the perfect frame. Lowest score wins."
    />
    <title>PauseFit Daily</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app" aria-live="polite">
      <section class="game-shell" aria-label="PauseFit daily challenge">
        <header class="topbar">
          <div>
            <p class="eyebrow" id="dailyLabel">Daily</p>
            <h1>PauseFit</h1>
          </div>
          <button class="icon-button" id="muteButton" type="button" aria-label="Toggle sound">
            <span aria-hidden="true" id="muteIcon">🔇</span>
          </button>
        </header>

        <div class="score-strip" aria-label="Current score">
          <div>
            <span class="score-label">Score</span>
            <strong id="scoreValue">0</strong>
          </div>
          <div>
            <span class="score-label">Loops</span>
            <strong id="loopValue">0</strong>
          </div>
          <div>
            <span class="score-label">Misses</span>
            <strong id="missValue">0</strong>
          </div>
        </div>

        <div class="video-stage" id="videoStage">
          <video
            id="challengeVideo"
            playsinline
            muted
            preload="auto"
            aria-label="Daily challenge video"
          ></video>
          <div class="outline" id="targetOutline" aria-hidden="true"></div>
          <div class="tap-shield" id="tapShield" role="button" tabindex="0" aria-label="Pause video"></div>
          <div class="status-pill" id="statusPill">Tap to start</div>
        </div>

        <section class="challenge-info">
          <div>
            <p class="topic" id="topicName">Loading daily</p>
            <p class="hint" id="hintText">Watch the loop, then tap when the moving subject fits the outline.</p>
          </div>
          <button class="primary-button" id="startButton" type="button">Start</button>
        </section>
      </section>

      <dialog class="result-dialog" id="resultDialog">
        <div class="result-card" id="resultCard">
          <p class="eyebrow" id="resultDaily">Daily</p>
          <h2 id="resultTitle">Solved</h2>
          <div class="big-score">
            <span>Score</span>
            <strong id="resultScore">0</strong>
          </div>
          <div class="result-stats">
            <span id="resultLoops">0 loops</span>
            <span id="resultMisses">0 misses</span>
          </div>
          <pre id="shareText" class="share-text"></pre>
        </div>
        <div class="result-actions">
          <button class="primary-button" id="shareButton" type="button">Share</button>
          <button class="secondary-button" id="copyButton" type="button">Copy Text</button>
          <button class="secondary-button" id="closeResultButton" type="button">Close</button>
        </div>
      </dialog>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
